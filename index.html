<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz – Kancelaria Sejmu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-red: #8B0000;
            --paper: #f9f7f1;
        }

        body {
            background-color: #2c2c2c;
            font-family: 'Libre+Baskerville', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rp-warning-bar {
            background: var(--dark-red);
            color: white;
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }

        .document {
            background-color: var(--paper);
            width: 100%;
            max-width: 800px;
            padding: 60px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid #ddd;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--dark-red);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .godlo {
            width: 80px;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin: 0;
            color: #1a1a1a;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 16px;
            margin: 10px 0 0;
            color: var(--dark-red);
            letter-spacing: 4px;
        }

        .section {
            margin-bottom: 25px;
            border: 1px solid #ccc;
            padding: 20px;
            background: rgba(255,255,255,0.5);
        }

        h3 {
            font-size: 14px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 5px;
            margin-top: 0;
            color: #444;
            letter-spacing: 1px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #333;
            text-transform: uppercase;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            background: transparent;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field-small {
            display: flex;
            flex-direction: column;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 13px;
        }

        .checkbox-wrapper input {
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--dark-red);
            color: white;
            border: 1px solid var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #600000;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Stylizacja dla urządzeń mobilnych */
        @media (max-width: 600px) {
            .grid-row { grid-template-columns: 1fr; }
            .document { padding: 20px; }
        }
    </style>
</head>
