<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kancelaria Sejmu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rp-warning-bar">ROLEPLAY - FORMULARZ NIESTOWARZYSZONY</div>
    <div class="document">
        <div class="header">
            <img src="godlo.png" alt="Godło" class="godlo">
            <h1>KANCELARIA SEJMU</h1>
            <h2>FORMULARZ ZGŁOSZENIOWY</h2>
        </div>

        <form id="form">
            <h3>DANE OSOBOWE</h3>
            <input type="text" name="imie" placeholder="Imię" required>
            <input type="text" name="nazwisko" placeholder="Nazwisko" required>
            
            <h3>TOŻSAMOŚĆ</h3>
            <input type="text" name="roblox_nick" placeholder="Nick Roblox" required>
            <input type="text" name="roblox_id" placeholder="ID Roblox" required>
            <input type="text" name="discord_id" placeholder="ID Discord (cyfry)" required>

            <h3>URZĄD</h3>
            <select name="wydzial">
                <option>Wydział Sekretariatu</option>
                <option>Wydział Koordynacyjno-Legislacyjny</option>
                <option>Wydział Spisu Głosowań</option>
            </select>
            <textarea name="opis" placeholder="Opis zadań..." required></textarea>

            <button type="submit" id="btn">ZŁÓŻ WNIOSEK</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
