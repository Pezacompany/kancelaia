<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Warszawa Weryfikacja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_with_gradient.svg" width="60">
        <h2>Select Account to Continue to Warszawa Weryfikacja</h2>
        
        <p style="color: #ccc; font-size: 14px;">Kliknij poniżej, aby bezpiecznie zweryfikować swoje konto.</p>
        
        <button id="loginBtn" class="continue-btn">Continue</button>
        
        <div class="footer">
            ©2026 Roblox Corporation. Roblox, the Roblox logo...
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('loginBtn').addEventListener('click', () => {
            // Przekierowanie do oficjalnego logowania Roblox
            // Musisz wygenerować ten link w API lub wpisać go na sztywno z Twoim ClientID
            window.location.href = `/api/roblox-auth?token=${token}`;
        });
    </script>
</body>
</html>
