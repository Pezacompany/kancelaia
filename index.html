<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kancelaria Sejmu – Wniosek</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Libre+Baskerville&display=swap" rel="stylesheet">
    <style>
        body { background: #e0e0e0; font-family: 'Libre Baskerville', serif; padding: 20px; }
        .document { max-width: 700px; margin: 0 auto; background: #f9f9f7; padding: 40px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #8B0000; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 0; }
        .section { margin-bottom: 20px; }
        label { display: block; font-weight: bold; font-size: 12px; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; }
        button { width: 100%; padding: 15px; background: #8B0000; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background: #600; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="document">
        <div class="header"><h1>KANCELARIA SEJMU</h1><p>WNIOSEK URZĘDOWY</p></div>
        <form id="formWniosek">
            <div class="section">
                <div class="grid">
                    <div><label>Imię</label><input type="text" name="imie" required></div>
                    <div><label>Nazwisko</label><input type="text" name="nazwisko" required></div>
                </div>
                <label>ID Discord (same cyfry)</label><input type="text" name="discord_id" required>
                <label>Nick Roblox</label><input type="text" name="roblox_nick" required>
                <label>ID Roblox</label><input type="text" name="roblox_id" required>
                <label>Wydział</label>
                <select name="wydzial">
                    <option>Wydział Sekretariatu</option>
                    <option>Wydział Koordynacyjno-Legislacyjny</option>
                    <option>Wydział Spisu Głosowań</option>
                </select>
                <label>Opis działań</label><textarea name="opis" required></textarea>
            </div>
            <button type="submit" id="btn">ZŁÓŻ WNIOSEK</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
