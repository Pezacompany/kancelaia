<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz – Kancelaria Sejmu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="rp-warning-bar">
        Strona została stworzona pod Roleplay – nie jest oficjalnym formularzem
    </div>

    <div class="document">
        <div class="header">
            <img src="godlo.png" alt="Godło" class="godlo">
            <h1>KANCELARIA SEJMU</h1>
            <h2>FORMULARZ ZGŁOSZENIOWY</h2>
        </div>

        <form id="form">
            <!-- SEKCJA: DANE OSOBOWE -->
            <div class="section">
                <h3>DANE OSOBOWE</h3>
                <div class="grid-row">
                    <div class="field">
                        <label>Imię</label>
                        <input type="text" name="imie" required>
                    </div>
                    <div class="field">
                        <label>Drugie imię</label>
                        <input type="text" name="drugieimie">
                    </div>
                </div>
                <label>Nazwisko</label>
                <input type="text" name="nazwisko" required>
                <label>Obywatelstwo</label>
                <input type="text" name="obywatelstwo">
            </div>

            <!-- SEKCJA: WERYFIKACJA KONT -->
            <div class="section">
                <h3>TOŻSAMOŚĆ (ROBLOX & DISCORD)</h3>
                <div class="grid-row">
                    <div class="field">
                        <label>NICK ROBLOX</label>
                        <input type="text" name="roblox_nick" required>
                    </div>
                    <div class="field">
                        <label>ID ROBLOX</label>
                        <input type="text" name="roblox_id" required>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="field">
                        <label>NICK DISCORD</label>
                        <input type="text" name="discord_nick" required>
                    </div>
                    <div class="field">
                        <label>ID DISCORD (Cyfrowe)</label>
                        <input type="text" name="discord_id" required>
                    </div>
                </div>
            </div>

            <!-- SEKCJA: ADRES -->
            <div class="section">
                <h3>ADRES ZAMIESZKANIA</h3>
                <label>Ulica</label>
                <input type="text" name="ulica">
                <div class="grid-row">
                    <div class="field-small">
                        <label>Nr domu / lokalu</label>
                        <input type="text" name="dom">
                    </div>
                    <div class="field-small">
                        <label>Kod pocztowy</label>
                        <input type="text" name="kod">
                    </div>
                </div>
                <label>Miasto</label>
                <input type="text" name="miasto">
                <label>Województwo</label>
                <select name="woj">
                    <option>dolnośląskie</option>
                    <option>kujawsko-pomorskie</option>
                    <option>lubelskie</option>
                    <option>lubuskie</option>
                    <option>łódzkie</option>
                    <option>małopolskie</option>
                    <option>mazowieckie</option>
                    <option>opolskie</option>
                    <option>podkarpackie</option>
                    <option>podlaskie</option>
                    <option>pomorskie</option>
                    <option>śląskie</option>
                    <option>świętokrzyskie</option>
                    <option>warmińsko-mazurskie</option>
                    <option>wielkopolskie</option>
                    <option>zachodniopomorskie</option>
                </select>
            </div>

            <!-- SEKCJA: URZĘDOWE -->
            <div class="section">
                <h3>DANE URZĘDOWE</h3>
                <label>Wydział</label>
                <select name="wydzial">
                    <option>Wydział Sekretariatu</option>
                    <option>Wydział Koordynacyjno-Legislacyjny</option>
                    <option>Wydział Spisu Głosowań</option>
                </select>
                <label>Opis co robi dany wydział (Twoje zadania)</label>
                <textarea name="opis" required></textarea>
            </div>

            <!-- SEKCJA: OŚWIADCZENIA -->
            <div class="section">
                <h3>OŚWIADCZENIA</h3>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="zgoda1" id="zgoda1" required>
                    <label for="zgoda1" class="label-inline">Oświadczam, że podane dane są prawdziwe</label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="zgoda2" id="zgoda2" required>
                    <label for="zgoda2" class="label-inline">Zgadzam się na przetwarzanie danych w ramach Roleplay</label>
                </div>
            </div>

            <button type="submit">ZŁÓŻ WNIOSEK</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
